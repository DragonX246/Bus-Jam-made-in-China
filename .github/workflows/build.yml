name: Build BusJam

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output: BusJam.exe
          - os: ubuntu-latest
            output: BusJam-linux
          - os: macos-latest
            output: BusJam-mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Compile
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            gcc jogo.c -o BusJam.exe
          elif [ "$RUNNER_OS" = "Linux" ]; then
            gcc jogo.c -o BusJam-linux
          else
            gcc jogo.c -o BusJam-mac
          fi

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
