name: Build Game

on:
  push:
  workflow_dispatch:

jobs:

  build:

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v4

      - name: Compile Windows
        if: runner.os == 'Windows'
        run: gcc jogo.c -o jogo.exe

      - name: Compile Linux
        if: runner.os == 'Linux'
        run: gcc jogo.c -o jogo

      - name: Compile macOS
        if: runner.os == 'macOS'
        run: gcc jogo.c -o jogo

      - name: Copy entrada.txt
        shell: bash
        run: |
          mkdir output
          cp entrada.txt output/

          if [ "$RUNNER_OS" = "Windows" ]; then
            cp jogo.exe output/
          else
            cp jogo output/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: jogo-${{ runner.os }}
          path: output/
